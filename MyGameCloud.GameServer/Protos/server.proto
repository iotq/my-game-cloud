syntax = "proto3";

option csharp_namespace = "MyGameCloud.Protos";

message LoginConent {
    string player_id = 1;
}

message PlayerContent {
    int32 short_id = 1;
    float x = 2;
    float y = 3;
    float rotation = 4;
    int32 hp = 5;
    int32 mass = 6;
}

message PlayerFullInfo {
    string id = 1;
    string name = 2;
    int32 short_id = 3;
    int32 character_id = 4;
    float x = 5;
    float y = 6;
    float rotation = 7;
    int32 hp = 8;
    int32 mass = 9;
}

message RealtimeContent {
    repeated PlayerContent players = 1;
}

message RoomSnapshot {
    repeated PlayerFullInfo players = 1;
}

message EnterContent {
    string playerId = 1;
}

message ServerPacket {
    int32 id = 1;
    int64 timestamp = 2;

    oneof content {
        LoginConent login = 3;
        EnterContent enter = 4;
        RealtimeContent realtime = 5;
        RoomSnapshot roomSnapshot = 6;
    }
    
}